<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="video-trending-app - by Antono4">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Video Trending - Facebook & TikTok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --bg-card-hover: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #666666;
            --accent-facebook: #1877f2;
            --accent-tiktok: linear-gradient(90deg, #00f2ea, #ff0050);
            --accent-gradient: linear-gradient(90deg, #ff0050, #00d4ff);
            --border-color: rgba(255, 255, 255, 0.1);
            --border-color-hover: rgba(255, 255, 255, 0.2);
        }

        .light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-card-hover: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: rgba(0, 0, 0, 0.1);
            --border-color-hover: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            white-space: nowrap;
        }

        .logo-icon {
            font-size: 32px;
            animation: flame 1.5s ease-in-out infinite;
        }

        @keyframes flame {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .gradient-text {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-card-hover);
            transform: rotate(30deg);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 12px 20px;
            padding-left: 45px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            width: 280px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--accent-facebook);
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.2);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Platform Tabs */
        .platform-tabs {
            display: flex;
            gap: 12px;
            margin: 30px auto 20px;
            max-width: 1600px;
            padding: 0 30px;
        }

        .platform-tab {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .platform-tab.facebook {
            background: rgba(24, 119, 242, 0.15);
            color: var(--accent-facebook);
            border: 2px solid transparent;
        }

        .platform-tab.facebook.active {
            background: var(--accent-facebook);
            color: white;
            box-shadow: 0 8px 30px rgba(24, 119, 242, 0.4);
            transform: translateY(-2px);
        }

        .platform-tab.tiktok {
            background: rgba(255, 0, 80, 0.15);
            color: #ff0050;
            border: 2px solid transparent;
        }

        .platform-tab.tiktok.active {
            background: var(--accent-tiktok);
            color: white;
            border: none;
            box-shadow: 0 8px 30px rgba(255, 0, 80, 0.4);
            transform: translateY(-2px);
        }

        .platform-tab.all {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            border: 2px solid transparent;
        }

        .platform-tab.all.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        /* Filters Container */
        .filters-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto 25px;
            padding: 0 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 22px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
        }

        .category-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border-color-hover);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.3);
        }

        /* Sort Dropdown */
        .sort-dropdown {
            position: relative;
        }

        .sort-btn {
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .sort-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-color-hover);
        }

        .sort-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            min-width: 180px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        .sort-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .sort-option {
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-option:hover {
            background: var(--bg-card-hover);
        }

        .sort-option.active {
            background: rgba(255, 0, 80, 0.15);
            color: #ff0050;
        }

        /* Stats Bar */
        .stats-bar {
            max-width: 1600px;
            margin: 0 auto 30px;
            padding: 0 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 22px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-number {
            font-size: 26px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 30px 50px;
        }

        /* Video Card */
        .video-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            border-color: var(--border-color-hover);
        }

        .video-thumbnail {
            position: relative;
            padding-top: 130%;
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            overflow: hidden;
        }

        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .video-card:hover .video-thumbnail img {
            transform: scale(1.1);
        }

        .video-duration {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.85);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .video-platform-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(8px);
        }

        .video-platform-badge.facebook {
            background: var(--accent-facebook);
            color: white;
        }

        .video-platform-badge.tiktok {
            background: var(--accent-tiktok);
            color: white;
        }

        .video-trending-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            animation: pulse 2s infinite;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6); }
        }

        .video-play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-card:hover .video-play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #1a1a2e;
            box-shadow: 0 8px 40px rgba(255, 255, 255, 0.3);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .video-card:hover .play-icon {
            transform: scale(1);
        }

        .video-info {
            padding: 18px;
        }

        .video-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 45px;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .video-stats {
            display: flex;
            gap: 15px;
        }

        .video-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .action-btn.download {
            background: rgba(255, 0, 80, 0.15);
            color: #ff0050;
        }

        .action-btn.download:hover {
            background: #ff0050;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4);
        }

        .action-btn.share {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }

        .action-btn.share:hover {
            background: #00d4ff;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        .action-btn.favorite {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }

        .action-btn.favorite:hover, .action-btn.favorite.active {
            background: #ffc107;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .video-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .video-creator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .creator-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            font-weight: 600;
        }

        .video-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-desc {
            font-size: 14px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        .footer a {
            color: #ff0050;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-video-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .modal-platform-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .modal-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .modal-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent-tiktok);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .modal-cta:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 0, 80, 0.4);
        }

        .modal-cta.facebook-cta {
            background: var(--accent-facebook);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 16px 32px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-weight: 500;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            font-size: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .search-box input {
                width: 100%;
            }

            .platform-tabs {
                justify-content: center;
                padding: 0 15px;
            }

            .platform-tab {
                padding: 12px 20px;
                font-size: 13px;
            }

            .filters-container {
                padding: 0 15px;
            }

            .category-filter {
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 10px;
            }

            .category-btn {
                white-space: nowrap;
            }

            .video-grid {
                grid-template-columns: 1fr;
                padding: 15px;
                gap: 20px;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
                padding: 0 15px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-number {
                font-size: 22px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-color-hover);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <span>Video<span class="gradient-text">Trending</span></span>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Cari video...">
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Platform Tabs -->
    <div class="platform-tabs">
        <button class="platform-tab all active" onclick="filterPlatform('all')">
            🎯 Semua
        </button>
        <button class="platform-tab facebook" onclick="filterPlatform('facebook')">
            📘 Facebook
        </button>
        <button class="platform-tab tiktok" onclick="filterPlatform('tiktok')">
            🎵 TikTok
        </button>
    </div>

    <!-- Filters -->
    <div class="filters-container">
        <div class="category-filter">
            <button class="category-btn active" onclick="filterCategory('all')">Semua</button>
            <button class="category-btn" onclick="filterCategory('trending')">🔥 Trending</button>

    <script>
        // Video Data - Expanded to 30 videos

            { id: 17, title: "Goal Spektakuler dari Liga Champions! ⚽🔥", platform: "tiktok", category: "sports", views: "19.3M", likes: "2.8M", duration: "0:48", thumbnail: "https://picsum.photos/seed/football/400/520", trending: true, creator: "SportHighlight", created: "5 jam lalu" },
            { id: 18, title: "Gameplay Mobile Legend Bang Bang 🎮", platform: "facebook", category: "gaming", views: "6.8M", likes: "534K", duration: "8:45", thumbnail: "https://picsum.photos/seed/mlbb/400/520", trending: false, creator: "ProGamer", created: "22 jam lalu" },
            { id: 19, title: "Viral! Anak Kecil Dance TikTok Sambil Masak 🍳", platform: "tiktok", category: "trending", views: "38.1M", likes: "7.2M", duration: "1:15", thumbnail: "https://picsum.photos/seed/kidcook/400/520", trending: true, creator: "ViralKids", created: "30 menit lalu" },
            { id: 20, title: "Resep Ayam Geprek yang Bikin Nagih! 🍗", platform: "facebook", category: "food", views: "4.5M", likes: "312K", duration: "3:30", thumbnail: "https://picsum.photos/seed/geprek/400/520", trending: false, creator: "MasakYuk", created: "1 hari lalu" },
            { id: 21, title: "Tutorial Hijab Modern untuk Ke Kantor 👗", platform: "facebook", category: "beauty", views: "3.1M", likes: "267K", duration: "5:15", thumbnail: "https://picsum.photos/seed/hijab/400/520", trending: false, creator: "HijabStyle", created: "1 hari lalu" },
            { id: 22, title: "Baby Hamster Lucu Makan Wortel 🐹", platform: "tiktok", category: "pets", views: "11.2M", likes: "1.9M", duration: "0:35", thumbnail: "https://picsum.photos/seed/hamster/400/520", trending: true, creator: "TinyPaws", created: "6 jam lalu" },
            { id: 23, title: "Komedian Ini Bikin Studio Tertawa Mewah! 😂", platform: "facebook", category: "comedy", views: "9.8M", likes: "876K", duration: "2:45", thumbnail: "https://picsum.photos/seed/standup/400/520", trending: true, creator: "ComedyClub", created: "8 jam lalu" },
            { id: 24, title: "Guitar Cover Lagu Pop Indonesia 🎸", platform: "tiktok", category: "music", views: "7.6M", likes: "1.1M", duration: "3:20", thumbnail: "https://picsum.photos/seed/guitar/400/520", trending: false, creator: "GuitarPro", created: "14 jam lalu" },
            { id: 25, title: "Tren Fashion 2024 yang Wajib Kamu Coba! 👗", platform: "tiktok", category: "trending", views: "16.4M", likes: "2.3M", duration: "1:40", thumbnail: "https://picsum.photos/seed/fashion2024/400/520", trending: true, creator: "FashionForward", created: "3 jam lalu" },
            { id: 26, title: "Momen Dramatis Pertandingan Basket NBA 🏀", platform: "facebook", category: "sports", views: "8.9M", likes: "678K", duration: "4:10", thumbnail: "https://picsum.photos/seed/basketball/400/520", trending: false, creator: "NBA Highlights", created: "1 hari lalu" },
            { id: 27, title: "Let's Play Valorant - Ranked Game! 🎯", platform: "tiktok", category: "gaming", views: "12.3M", likes: "1.5M", duration: "12:30", thumbnail: "https://picsum.photos/seed/valorant/400/520", trending: false, creator: "GameStreamer", created: "16 jam lalu" },
            { id: 28, title: "Tutorial Yoga untuk Pemula -放松身心🧘", platform: "facebook", category: "beauty", views: "2.9M", likes: "198K", duration: "8:00", thumbnail: "https://picsum.photos/seed/yoga/400/520", trending: false, creator: "ZenLife", created: "2 hari lalu" },
            { id: 29, title: "Puppy Training yang Lucu tapi Gagal! 🐶😂", platform: "tiktok", category: "pets", views: "22.1M", likes: "4.1M", duration: "0:55", thumbnail: "https://picsum.photos/seed/puppytrain/400/520", trending: true, creator: "DogLife", created: "2 jam lalu" },
            { id: 30, title: "Street Dance Indonesia 2024 - Jawara! 💪", platform: "tiktok", category: "dance", views: "31.5M", likes: "5.8M", duration: "2:10", thumbnail: "https://picsum.photos/seed/sdi2024/400/520", trending: true, creator: "DanceIndonesia", created: "1 jam lalu" }
        ];

        // State
        let currentPlatform = 'all';
        let currentCategory = 'all';
        let currentSort = 'newest';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let isDarkMode = localStorage.getItem('darkMode') !== 'false';

        // Initialize
        function init() {
            applyTheme();
            renderVideos();
            setupEventListeners();
        }

        // Theme Toggle
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            applyTheme();
            showToast(isDarkMode ? '🌙 Dark Mode Aktif' : '☀️ Light Mode Aktif');
        }

        function applyTheme() {
            document.body.classList.toggle('light-mode', !isDarkMode);
            document.getElementById('themeIcon').textContent = isDarkMode ? '🌙' : '☀️';
        }

        // Sort Menu
        function toggleSortMenu() {
            document.getElementById('sortMenu').classList.toggle('show');
        }

        function setSort(sort) {
            currentSort = sort;
            const labels = { newest: 'Terbaru', popular: 'Populer', oldest: 'Terlama' };
            document.getElementById('currentSort').textContent = labels[sort];
            document.querySelectorAll('.sort-option').forEach(opt => opt.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('sortMenu').classList.remove('show');
            renderVideos();
        }

        // Toggle Favorite
        function toggleFavorite(id, event) {
            event.stopPropagation();
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                showToast('❤️ Dihapus dari Favorit');
            } else {
                favorites.push(id);
                showToast('💛 Ditambahkan ke Favorit');
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderVideos();
        }

        // Render Videos
        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            let filtered = videos.filter(v => {
                const matchPlatform = currentPlatform === 'all' || v.platform === currentPlatform;
                const matchCategory = currentCategory === 'all' || v.category === currentCategory;
                const matchSearch = v.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchPlatform && matchCategory && matchSearch;
            });

            // Sort
            switch (currentSort) {
                case 'popular':
                    const parseViews = (v) => parseFloat(v.replace(/[^0-9.]/g, '')) * (v.includes('M') ? 1000000 : 1000);
                    filtered.sort((a, b) => parseViews(b.views) - parseViews(a.views));
                    break;
                case 'oldest':
                    filtered.reverse();
                    break;
            }
            filtered.sort((a, b) => (b.trending ? 1 : 0) - (a.trending ? 1 : 0));

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Tidak ada video ditemukan</div><div class="empty-desc">Coba ubah filter atau kata kunci pencarian</div></div>`;
                updateStats();
                return;
            }

            grid.innerHTML = filtered.map(video => `
                <div class="video-card" onclick="openVideo(${video.id})">
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                        <span class="video-duration">${video.duration}</span>
                        <span class="video-platform-badge ${video.platform}">${video.platform === 'tiktok' ? '🎵' : '📘'} ${video.platform}</span>
                        ${video.trending ? '<span class="video-trending-badge">🔥 HOT</span>' : ''}
                        <div class="video-play-overlay"><div class="play-icon">▶</div></div>
                    </div>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <div class="video-meta">
                            <div class="video-stats">
                                <span class="video-stat">👁️ ${video.views}</span>
                                <span class="video-stat">❤️ ${video.likes}</span>
                            </div>
                            <div class="video-actions">
                                <button class="action-btn favorite ${favorites.includes(video.id) ? 'active' : ''}" onclick="toggleFavorite(${video.id}, event)" title="Favorit">${favorites.includes(video.id) ? '💛' : '🤍'}</button>
                                <button class="action-btn share" onclick="event.stopPropagation(); shareVideo(${video.id})" title="Share">📤</button>
                            </div>
                        </div>
                        <div class="video-footer">
                            <div class="video-creator"><span class="creator-avatar">${video.creator.charAt(0)}</span><span>@${video.creator}</span></div>
                            <span class="video-time">${video.created}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            updateStats();
        }

        // Update Stats
        function updateStats() {
            const filtered = videos.filter(v => {
                const matchPlatform = currentPlatform === 'all' || v.platform === currentPlatform;
                const matchCategory = currentCategory === 'all' || v.category === currentCategory;
                const matchSearch = v.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchPlatform && matchCategory && matchSearch;
            });

            document.getElementById('totalVideos').textContent = filtered.length;
            const parseNum = (v) => parseFloat(v.replace(/[^0-9.]/g, '')) * (v.includes('M') ? 1000000 : 1000);
            const totalViews = filtered.reduce((sum, v) => sum + parseNum(v.views), 0);
            document.getElementById('totalViews').textContent = totalViews >= 1000000 ? (totalViews / 1000000).toFixed(1) + 'M' : (totalViews / 1000).toFixed(0) + 'K';
            const totalLikes = filtered.reduce((sum, v) => sum + parseNum(v.likes), 0);
            document.getElementById('totalLikes').textContent = totalLikes >= 1000000 ? (totalLikes / 1000000).toFixed(1) + 'M' : (totalLikes / 1000).toFixed(0) + 'K';
            document.getElementById('fbCount').textContent = videos.filter(v => v.platform === 'facebook').length;
            document.getElementById('ttCount').textContent = videos.filter(v => v.platform === 'tiktok').length;
        }

        // Filter Platform
        function filterPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.platform-tab.${platform}`).classList.add('active');
            renderVideos();
        }

        // Filter Category
        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderVideos();
        }

        // Open Video Modal
        function openVideo(id) {
            const video = videos.find(v => v.id === id);
            if (!video) return;
            const modal = document.getElementById('videoModal');
            const content = document.getElementById('modalContent');
            const isTiktok = video.platform === 'tiktok';
            content.innerHTML = `
                <div class="modal-video-info">
                    <div class="modal-platform-icon">${isTiktok ? '🎵' : '📘'}</div>
                    <h2 class="modal-title">${video.title}</h2>
                    <div class="modal-stats">
                        <span class="modal-stat">👁️ ${video.views}</span>
                        <span class="modal-stat">❤️ ${video.likes}</span>
                        <span class="modal-stat">⏱️ ${video.duration}</span>
                    </div>
                    <p style="color: var(--text-secondary); margin-bottom: 15px;">oleh <strong>@${video.creator}</strong> • ${video.created}</p>
                    <a href="#" class="modal-cta ${isTiktok ? '' : 'facebook-cta'}" onclick="showToast('Buka di ${isTiktok ? 'TikTok' : 'Facebook'} untuk melihat video lengkap!')">${isTiktok ? '🎵' : '📘'} Buka di ${isTiktok ? 'TikTok' : 'Facebook'}</a>
                </div>`;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close Modal
        function closeModal() {
            document.getElementById('videoModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function closeModalOnBackdrop(event) {
            if (event.target.id === 'videoModal') closeModal();
        }

        // Share Video
        function shareVideo(id) {
            const video = videos.find(v => v.id === id);
            if (navigator.share) {
                navigator.share({ title: video.title, text: 'Lihat video trending ini!', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('📋 Link copied to clipboard!');
            }
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderVideos();
            });
            document.addEventListener('click', (e) => {
                const sortMenu = document.getElementById('sortMenu');
                if (!e.target.closest('.sort-dropdown')) sortMenu.classList.remove('show');
            });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        }

        init();
    </script>
